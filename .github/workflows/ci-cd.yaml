name: CI/CD Pipeline

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging

permissions:
  contents: read
  packages: write

jobs:
  # ========================================
  # FRONTEND - LINT & BUILD CHECK
  # ========================================
  frontend-lint:
    name: Frontend - Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Cleanup workspace
        if: always()
        run: |
          rm -rf node_modules .nuxt .output
          git clean -fdx

  # ========================================
  # BUILD & PUSH DOCKER IMAGE
  # ========================================
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/staging')
    outputs:
      image: ${{ steps.vars.outputs.image }}
      branch_tag: ${{ steps.vars.outputs.branch_tag }}
      sha_tag: ${{ steps.vars.outputs.sha_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set image variables
        id: vars
        run: |
          REPO_OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          echo "image=ghcr.io/$REPO_OWNER_LOWER/gpci-compro" >> $GITHUB_OUTPUT
          echo "branch_tag=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "sha_tag=$SHORT_SHA" >> $GITHUB_OUTPUT
          if [ "$BRANCH_NAME" = "master" ]; then
            echo "latest_tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Build & push image
        run: |
          IMAGE=${{ steps.vars.outputs.image }}
          docker build -t $IMAGE:${{ steps.vars.outputs.branch_tag }} .
          docker tag $IMAGE:${{ steps.vars.outputs.branch_tag }} $IMAGE:${{ steps.vars.outputs.sha_tag }}
          docker push $IMAGE:${{ steps.vars.outputs.branch_tag }}
          docker push $IMAGE:${{ steps.vars.outputs.sha_tag }}
          if [ -n "${{ steps.vars.outputs.latest_tag }}" ]; then
            docker tag $IMAGE:${{ steps.vars.outputs.branch_tag }} $IMAGE:latest
            docker push $IMAGE:latest
          fi

      - name: Cleanup
        if: always()
        run: |
          docker logout ghcr.io || true
          git clean -fdx

  # ========================================
  # DEPLOY TO STAGING
  # ========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.branch_tag || 'staging' }}
          IMAGE: ${{ needs.build.outputs.image }}
          APP_PATH: ${{ vars.STAGING_APP_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.STAGING_HOST }}
          port: ${{ secrets.STAGING_PORT }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          envs: IMAGE_TAG,IMAGE,APP_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "$APP_PATH"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE:$IMAGE_TAG"
            docker logout ghcr.io || true

            docker tag "$IMAGE:$IMAGE_TAG" gpci-compro:latest

            docker compose up -d --force-recreate

            docker image prune -f
            echo "Deployment to staging completed!"

  # ========================================
  # DEPLOY TO PRODUCTION
  # ========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ needs.build.outputs.branch_tag || 'master' }}
          IMAGE: ${{ needs.build.outputs.image }}
          APP_PATH: ${{ vars.PRODUCTION_APP_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          port: ${{ secrets.PRODUCTION_PORT }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          envs: IMAGE_TAG,IMAGE,APP_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e
            cd "$APP_PATH"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE:$IMAGE_TAG"
            docker logout ghcr.io || true

            docker tag "$IMAGE:$IMAGE_TAG" gpci-compro:latest

            docker compose up -d --force-recreate

            docker image prune -f
            echo "Deployment to production completed!"
